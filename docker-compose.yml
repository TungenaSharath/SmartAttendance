version: "3.8"

services:
  app:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./reports:/app/reports
    environment:
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - SIM_THRESHOLD=${SIM_THRESHOLD:-0.45}
      - DET_CONFIDENCE=${DET_CONFIDENCE:-0.5}
      - ARCFACE_MODEL=${ARCFACE_MODEL:-buffalo_l}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
